services:
  mysql:
    image: mysql:8.4
    container_name: mysql
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/mysql_root_password
      MYSQL_DATABASE: testdb

    secrets:
      - mysql_root_password

    volumes:
      - mysql_data:/var/lib/mysql

    networks:
      - backend

  php:
    build:
      context: .
    container_name: php

    volumes:
      - ./index.php:/var/www/html/index.php

    networks:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx

    depends_on:
      - php

    ports:
      - "4001:80"

    volumes:
      - ./index.php:/var/www/html/index.php
      - ./default.conf:/etc/nginx/conf.d/default.conf

    networks:
      - frontend
      - backend

  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: phpmyadmin
    restart: always

    depends_on:
      - mysql

    ports:
      - "6001:80"

    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306

    networks:
      - backend

networks:
  frontend:
  backend:

volumes:
  mysql_data:

secrets:
  mysql_root_password:
    file: ./mysql_root_password.txt
